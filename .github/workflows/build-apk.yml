name: Build MI Trade Master APK

on:
  push:
    branches: ["main"]
    paths:
      - "android-app/**"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generate Gradle wrapper if missing
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            gradle wrapper --gradle-version 8.7
          fi

      - name: Restore google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" > app/google-services.json
          else
            echo "WARNING: GOOGLE_SERVICES_JSON secret not set, using placeholder."
            cp app/google-services.sample.json app/google-services.json
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Ensure debug keystore exists
        run: |
          create_keystore() {
            local KEYSTORE_PATH="$1"
            mkdir -p "$(dirname "$KEYSTORE_PATH")"
            if [ ! -f "$KEYSTORE_PATH" ]; then
              keytool -genkeypair -v \
                -keystore "$KEYSTORE_PATH" \
                -storepass android -keypass android \
                -alias AndroidDebugKey \
                -keyalg RSA -keysize 2048 -validity 10000 \
                -dname "CN=Android Debug,O=Android,C=US"
              echo "Generated new debug keystore at $KEYSTORE_PATH"
            else
              echo "Debug keystore already exists at $KEYSTORE_PATH"
            fi
          }
          # Legacy location (older AGP / Android tooling)
          create_keystore "$HOME/.android/debug.keystore"
          # New XDG-style location used by recent Android command-line tools
          create_keystore "$HOME/.config/.android/debug.keystore"

      - name: Print debug SHA-1 fingerprint
        run: ./gradlew signingReport --stacktrace

      - name: Build debug APK
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"
        run: ./gradlew assembleDebug --stacktrace

      - name: Rename APK with version and run number
        run: |
          mkdir -p app/build/outputs/apk/debug/release
          cp app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/release/MI-Trade-Master-v3.0.${{ github.run_number }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mi-trade-master-apk
          path: android-app/app/build/outputs/apk/debug/release/MI-Trade-Master-v3.0.${{ github.run_number }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v3.0.${{ github.run_number }}
          name: MI Trade Master v3.0.${{ github.run_number }}
          body: |
            Automated build from commit ${{ github.sha }}.

            Install: download the APK below, allow install from unknown sources on your device, and open it.

            If Google or GitHub Sign-In fails, check this run's log for the "Print debug SHA-1 fingerprint" step and make sure that fingerprint is added in Firebase Console under Project Settings, Your apps.
          files: android-app/app/build/outputs/apk/debug/release/MI-Trade-Master-v3.0.${{ github.run_number }}.apk
